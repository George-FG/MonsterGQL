type Query {
  getMonsterByName(name: String!): MonsterDrink
  me: User
}

type Mutation {
  signup(email: String!, username: String!, password: String!): AuthPayload!
  login(identifier: String!, password: String!): AuthPayload!
  logout: Boolean!
  addNewMonsterFlavor(name: String!, description: String!, globalRank: Float!): MonsterDrink!
}

type User {
  id: String!
  email: String!
  username: String!
}

type AuthPayload {
  token: String!
  user: User!
}

type MonsterDrink {
  id: String!
  name: String!
  description: String!
  globalRank: Float!
  userRank: Float
}

type MonsterFan {
  id: Int!
  userName: String
  rankedMonsters: [MonsterDrink!]!
  password: String!
}
