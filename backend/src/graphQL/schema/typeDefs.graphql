type Query {
  getMonsterByName(name: String!): MonsterDrink
  logInByNameAndPassword(userName: String!, password: String!): Boolean!
  getUsersRankedMonsters(userId: Int!): [MonsterDrink]!
}

type Mutation {
  updateGlobalRankForMonster(monsterDrinkName: String!, userRank: Int!): Float
}

type MonsterDrink {
  name: String!
  description: String!
  globalRank: Float!
  userRank: Float
  totalVotes: Int!
}

type MonsterFan {
  id: Int!
  userName: String
  rankedMonsters: [MonsterDrink!]! #this is going to be the users individual ranked monsters
  password: String!
}
