type Query {
  getMonsterByName(name: String!): MonsterDrink
  getAllMonsterDrinks: [MonsterDrink!]!
  me: User
  getMonsterFanRank(monsterDrinkId: String!): MonsterFanRank! # this will fetch the fan rank for a specific monster drink
  getUsersRankForMonster(monsterDrinkId: String!): [MonsterFanRank!]! # this will fetch the ranks of all users for a specific monster drink
  getRanksForMonsterFan(monsterFanId: Int!): [MonsterFanRank!]! # this will fetch the ranks of all monster drinks for a specific monster fan
}

type Mutation {
  signup(email: String!, password: String!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  logout: Boolean!
  addNewMonsterFlavor(name: String!, description: String!, globalRank: Float!): MonsterDrink!
  addNewMonsterFanRank(
    userId: Int!
    monsterDrinkId: String!
    tasteRank: Int!
    canDesignRank: Int!
  ): MonsterFanRank!
}

type User {
  id: String!
  email: String!
}

type AuthPayload {
  token: String!
  user: User!
}

type MonsterDrink {
  id: String!
  name: String!
  description: String!
  globalRank: Float!
  monsterFanRanks: [MonsterFanRank!]!
}

type MonsterFanRank {
  monsterFan: MonsterFan!
  monsterDrink: MonsterDrink!
  rank: RankForMonster
}

type RankForMonster {
  tasteRank: Int
  canDesignRank: Int
}

type MonsterFan {
  id: Int!
  userName: String
  rankedMonsters: [MonsterFanRank!]!
}
