mutation Login($identifier: String!, $password: String!) {
  login(identifier: $identifier, password: $password) {
    token
    user {
      id
      email
      username
    }
  }
}

mutation Signup($email: String!, $username: String!, $password: String!) {
  signup(email: $email, username: $username, password: $password) {
    token
    user {
      id
      email
      username
    }
  }
}

mutation Logout {
  logout
}

mutation AddDrink($name: String!, $description: String) {
  addNewMonsterFlavor(name: $name, description: $description) {
    id
    name
  }
}

query Me {
  me {
    id
    email
    username
  }
}

query GetAllDrinks {
  getAllDrinks {
    id
    name
    description
  }
}
